<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Marine Electrical Toolkit — calculators, load analysis, checklists, test forms, reference tables and power-system concepts, all in one page.">
<title>Marine Electrical Toolkit — All-in-One</title>
<style>
  :root{--bg:#0f1722;--panel:#16222f;--panel2:#1d2c3d;--line:#2b4258;--txt:#e8eef4;--mut:#8fa6ba;--acc:#34b8a0;--amber:#e9a23d;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
  header{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  header h1{font-size:16px;font-weight:600;white-space:nowrap}
  .tabs{display:flex;gap:6px;flex-wrap:wrap}
  .tabs button{background:var(--panel2);color:var(--mut);border:1px solid var(--line);border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer}
  .tabs button.on{background:var(--acc);color:#06251f;border-color:var(--acc);font-weight:700}
  .port{margin-left:auto;color:var(--amber);font-weight:600;font-size:13px;text-decoration:none;white-space:nowrap}
  iframe{flex:1;width:100%;border:none;background:var(--bg)}
</style>
</head>
<body>
<header>
  <h1>⚓ Marine Electrical Toolkit</h1>
  <div class="tabs" id="tabs"></div>
  <a class="port" href="../index.html">Portfolio ↗</a>
</header>
<iframe id="fr" src="index.html" title="Toolkit content"></iframe>
<script>
const PAGES=[["Calculators","index.html"],["Load Analysis","loadcalc.html"],["Checklists","checklists.html"],
  ["Test Forms","testforms.html"],["Reference","reference.html"],["Projects & Concepts","projects.html"]];
const tabs=document.getElementById('tabs'), fr=document.getElementById('fr');
PAGES.forEach(([n,u],i)=>{
  const b=document.createElement('button'); b.textContent=n;
  b.onclick=()=>{fr.src=u;tabs.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
    history.replaceState(null,'','#'+u.replace('.html',''));};
  tabs.appendChild(b); if(i===0)b.classList.add('on');
});
// deep link: all.html#loadcalc opens that tab
const h=location.hash.replace('#','');
if(h){const i=PAGES.findIndex(p=>p[1].startsWith(h)); if(i>=0)tabs.children[i].click();}
</script>
</body>
</html>
